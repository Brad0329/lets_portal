<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>검토요청 공고 - LETS 프로젝트 관리</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/navbar.css">
    <style>
        header { display: none; }
        .attach-row td { border-top: none !important; }
        .attach-row:hover { background: #eef3f8 !important; }
    </style>
</head>
<body>
    <nav id="main-navbar"></nav>

    <!-- 상세보기 모달 -->
    <div id="modal-overlay" class="modal-overlay" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <div id="modal-body"></div>
        </div>
    </div>

    <main>
        <h2 style="font-size:1.3rem;font-weight:600;color:#1a5276;margin-bottom:16px;">검토요청 공고</h2>

        <!-- 필터 -->
        <div class="search-bar">
            <select id="filter-source">
                <option value="">전체 출처</option>
                <option value="K-Startup">K-Startup</option>
                <option value="중소벤처기업부">중소벤처기업부</option>
                <option value="나라장터">나라장터</option>
            </select>
            <select id="filter-sort">
                <option value="tagged">요청일 최신순</option>
                <option value="deadline">마감임박순</option>
                <option value="latest">입찰공고일 최신순</option>
            </select>
        </div>

        <!-- 공고 목록 -->
        <div id="notices-container">
            <table id="notices-table">
                <thead>
                    <tr>
                        <th class="col-source">출처</th>
                        <th class="col-title">공고명</th>
                        <th class="col-org">기관</th>
                        <th class="col-date">마감일</th>
                        <th class="col-status">상태</th>
                        <th style="width:80px">요청자</th>
                        <th style="width:70px">AI</th>
                    </tr>
                </thead>
                <tbody id="notices-body">
                    <tr><td colspan="6" class="loading">데이터 로딩 중...</td></tr>
                </tbody>
            </table>
        </div>

        <div id="pagination" class="pagination"></div>
    </main>

    <script src="/js/utils.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/app.js"></script>
    <script>
        let reviewPage = 1;

        document.addEventListener('DOMContentLoaded', async () => {
            const user = await checkAuth();
            if (!user) return;
            loadReviewNotices();

            ['filter-source', 'filter-sort'].forEach(id => {
                document.getElementById(id).addEventListener('change', () => {
                    reviewPage = 1;
                    loadReviewNotices();
                });
            });
        });

        async function loadReviewNotices() {
            const q = '';
            const source = document.getElementById('filter-source').value;
            const sort = document.getElementById('filter-sort').value;

            const params = new URLSearchParams({ tag: '검토요청', q, source, sort, page: reviewPage, size: 20 });
            const tbody = document.getElementById('notices-body');
            tbody.innerHTML = '<tr><td colspan="7" class="loading">검색 중...</td></tr>';

            try {
                const res = await fetch(`/api/notices/tagged?${params}`);
                const data = await res.json();
                currentNotices = data.notices;
                renderReviewNotices(data.notices);
                renderReviewPagination(data.total_pages, data.page);
            } catch (e) {
                tbody.innerHTML = '<tr><td colspan="6" class="loading">데이터 로드 실패</td></tr>';
            }
        }

        function renderReviewNotices(notices) {
            const tbody = document.getElementById('notices-body');
            if (!notices || notices.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="loading">검토요청 공고가 없습니다.</td></tr>';
                return;
            }
            tbody.innerHTML = notices.map(n => {
                const sourceClass = getSourceClass(n.source);
                const statusBadge = n.status === 'ongoing'
                    ? '<span class="badge badge-ongoing">진행중</span>'
                    : '<span class="badge badge-closed">마감</span>';

                // AI 분석 상태
                let aiCell = '';
                if (n.ai_status === 'analyzing') {
                    aiCell = '<span style="color:#e67e22;font-size:12px;">분석중...</span>';
                } else if (n.ai_status === 'done' && n.ai_match_rate != null) {
                    const rate = Math.round(n.ai_match_rate);
                    const color = rate >= 70 ? '#27ae60' : rate >= 50 ? '#e67e22' : '#e74c3c';
                    aiCell = `<span onclick="event.stopPropagation(); showAnalysis(${n.id})" style="cursor:pointer;color:${color};font-weight:700;font-size:13px;" title="클릭하여 상세 보기">${rate}%</span>`;
                } else if (n.ai_status === 'done') {
                    aiCell = `<span onclick="event.stopPropagation(); showAnalysis(${n.id})" style="cursor:pointer;color:#2980b9;font-size:12px;" title="클릭하여 상세 보기">결과</span>`;
                } else {
                    aiCell = `<button onclick="event.stopPropagation(); runAiAnalysis(${n.id}, this)" style="padding:2px 8px;font-size:11px;border:1px solid #3498db;border-radius:4px;background:#fff;color:#3498db;cursor:pointer;">분석</button>`;
                }

                // 공고 행
                let rows = `<tr onclick="openModal(${n.id})" style="cursor:pointer;">
                    <td><span class="source-badge ${sourceClass}">${escapeHtml(n.source)}</span></td>
                    <td>${escapeHtml(n.title)}</td>
                    <td>${escapeHtml(n.organization || '')}</td>
                    <td>${escapeHtml(n.end_date || '-')}</td>
                    <td>${statusBadge}</td>
                    <td>${escapeHtml(n.tagged_by_name || '-')}</td>
                    <td style="text-align:center">${aiCell}</td>
                </tr>`;

                // 첨부파일 전용 행 (attachments → file_url 폴백)
                let attachContent = '<span style="color:#aaa;">첨부파일 없음</span>';
                const attachSrc = n.attachments || n.file_url;
                if (attachSrc) {
                    try {
                        const files = JSON.parse(attachSrc);
                        if (files.length > 0) {
                            attachContent = files.map(f =>
                                `<a href="${escapeHtml(f.url)}" target="_blank" onclick="event.stopPropagation()" style="color:#2980b9;text-decoration:none;margin-right:12px;white-space:nowrap;">📎 ${escapeHtml(f.name)}</a>`
                            ).join('');
                        }
                    } catch {}
                }
                rows += `<tr class="attach-row">
                    <td colspan="6" style="padding:2px 8px 8px 8px;border-top:none;background:#f8f9fa;">
                        <div style="display:flex;flex-wrap:wrap;gap:4px 0;font-size:12px;">${attachContent}</div>
                    </td>
                </tr>`;

                // 사유 + 태그 버튼 행
                const memoText = n.tag_memo ? escapeHtml(n.tag_memo).replace(/\n/g, '<br>') : '';
                let actionBtns = `
                    <div style="margin-top:6px;text-align:right;">
                        <button class="tag-btn tag-btn-bid" onclick="event.stopPropagation(); reviewSetTag(${n.id}, '입찰대상')" style="padding:4px 12px;font-size:12px;">입찰예정</button>
                        <button class="tag-btn tag-btn-exclude" onclick="event.stopPropagation(); reviewSetTag(${n.id}, '제외')" style="padding:4px 12px;font-size:12px;">제외</button>
                    </div>
                `;
                rows += `<tr class="attach-row">
                    <td colspan="6" style="padding:6px 12px 8px 12px;border-top:none;background:#f0f4f7;">
                        <div style="font-size:12px;">
                            <div style="color:#555;line-height:1.6;">💬 ${memoText || '<span style=\"color:#aaa;\">사유 없음</span>'}</div>
                            ${actionBtns}
                        </div>
                    </td>
                </tr>`;

                return rows;
            }).join('');
        }

        async function reviewSetTag(noticeId, tag) {
            try {
                const res = await fetch(`/api/notice-tags/${noticeId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tag, memo: '' }),
                });
                const data = await res.json();
                if (data.success) {
                    loadReviewNotices(); // 리스트 새로고침 (태그 변경되면 목록에서 사라짐)
                }
            } catch (e) {
                console.error('태그 변경 실패:', e);
            }
        }

        function renderReviewPagination(totalPages, current) {
            const div = document.getElementById('pagination');
            if (totalPages <= 1) { div.innerHTML = ''; return; }
            let html = '';
            if (current > 1) html += `<button onclick="goReviewPage(${current - 1})">◀</button>`;
            const start = Math.max(1, current - 4);
            const end = Math.min(totalPages, current + 4);
            for (let i = start; i <= end; i++) {
                html += `<button class="${i === current ? 'active' : ''}" onclick="goReviewPage(${i})">${i}</button>`;
            }
            if (current < totalPages) html += `<button onclick="goReviewPage(${current + 1})">▶</button>`;
            div.innerHTML = html;
        }

        function goReviewPage(page) {
            reviewPage = page;
            loadReviewNotices();
            window.scrollTo(0, 0);
        }

        // ─── AI 분석 ───────────────────────────
        async function runAiAnalysis(noticeId, btn) {
            btn.disabled = true;
            btn.textContent = '분석중...';
            btn.style.color = '#e67e22';

            try {
                const res = await fetch(`/api/ai/analyze/${noticeId}`, { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    loadReviewNotices();
                    // 결과 바로 표시
                    showAnalysis(noticeId);
                } else {
                    alert(data.message || data.error || 'AI 분석 실패');
                    btn.disabled = false;
                    btn.textContent = '분석';
                    btn.style.color = '#3498db';
                }
            } catch (e) {
                alert('AI 분석 실패: ' + e.message);
                btn.disabled = false;
                btn.textContent = '분석';
                btn.style.color = '#3498db';
            }
        }

        async function showAnalysis(noticeId) {
            try {
                const res = await fetch(`/api/ai/analyses/${noticeId}`);
                const data = await res.json();
                renderAnalysisModal(data);
            } catch (e) {
                alert('분석 결과 로드 실패');
            }
        }

        function renderAnalysisModal(data) {
            const overlay = document.getElementById('modal-overlay');
            const body = document.getElementById('modal-body');

            let html = `<h3 style="margin:0 0 12px;font-size:16px;color:#1a5276">${escapeHtml(data.notice_title)}</h3>`;

            if (!data.analyses || data.analyses.length === 0) {
                html += '<p style="color:#aaa;">분석 결과가 없습니다.</p>';
            } else {
                for (const a of data.analyses) {
                    if (a.mode === 'full') {
                        const rateColor = a.match_rate >= 70 ? '#27ae60' : a.match_rate >= 50 ? '#e67e22' : '#e74c3c';
                        html += `<div style="border:1px solid #d0d5dd;border-radius:8px;padding:16px;margin-bottom:16px;">
                            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
                                <strong>${a.analysis_seq}차 분석</strong>
                                <span style="font-size:13px;color:#888">${(a.created_at||'').slice(0,16)}</span>
                            </div>
                            <div style="text-align:center;margin-bottom:12px;">
                                <span style="font-size:32px;font-weight:700;color:${rateColor}">${Math.round(a.match_rate||0)}%</span>
                                <div style="font-size:13px;color:#555;">매칭률 (${a.total_score||0}/${a.total_max_score||0}점)</div>
                            </div>`;

                        // 항목별 테이블
                        if (a.items && a.items.length > 0) {
                            html += `<table style="width:100%;border-collapse:collapse;font-size:13px;margin-bottom:12px;">
                                <thead><tr style="background:#f0f4f7;">
                                    <th style="padding:6px 8px;text-align:left;border:1px solid #ddd;">평가항목</th>
                                    <th style="padding:6px 8px;width:50px;border:1px solid #ddd;">배점</th>
                                    <th style="padding:6px 8px;width:50px;border:1px solid #ddd;">예상</th>
                                    <th style="padding:6px 8px;border:1px solid #ddd;">근거</th>
                                    <th style="padding:6px 8px;border:1px solid #ddd;">보완</th>
                                </tr></thead><tbody>`;
                            for (const item of a.items) {
                                html += `<tr>
                                    <td style="padding:6px 8px;border:1px solid #eee;">${escapeHtml(item.item||'')}</td>
                                    <td style="padding:6px 8px;border:1px solid #eee;text-align:center;">${item.max_score||0}</td>
                                    <td style="padding:6px 8px;border:1px solid #eee;text-align:center;font-weight:600;">${item.expected_score||0}</td>
                                    <td style="padding:6px 8px;border:1px solid #eee;font-size:12px;">${escapeHtml(item.rationale||'')}</td>
                                    <td style="padding:6px 8px;border:1px solid #eee;font-size:12px;color:#e67e22;">${escapeHtml(item.improvement||'-')}</td>
                                </tr>`;
                            }
                            html += '</tbody></table>';
                        }

                        html += `<div style="background:#f8f9fa;padding:10px 12px;border-radius:6px;font-size:13px;">
                            <strong>AI 의견:</strong> ${escapeHtml(a.recommendation||'')} — ${escapeHtml(a.items?.[0]?.rationale ? '' : '')}
                        </div>
                        <div style="text-align:right;font-size:11px;color:#aaa;margin-top:6px;">비용: ${(a.cost_krw||0).toFixed(0)}원</div>
                        </div>`;

                    } else {
                        // 간이 모드
                        const gradeColor = a.grade === '상' ? '#27ae60' : a.grade === '중' ? '#e67e22' : '#e74c3c';
                        html += `<div style="border:1px solid #d0d5dd;border-radius:8px;padding:16px;margin-bottom:16px;">
                            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
                                <strong>${a.analysis_seq}차 분석 (간이)</strong>
                                <span style="font-size:13px;color:#888">${(a.created_at||'').slice(0,16)}</span>
                            </div>
                            <div style="text-align:center;margin-bottom:12px;">
                                <span style="font-size:32px;font-weight:700;color:${gradeColor}">${escapeHtml(a.grade||'?')}</span>
                                <div style="font-size:13px;color:#555;">적합도 등급</div>
                            </div>
                            <div style="background:#f8f9fa;padding:10px 12px;border-radius:6px;font-size:13px;">
                                ${escapeHtml(a.reason||'')}
                            </div>
                            <div style="text-align:right;font-size:11px;color:#aaa;margin-top:6px;">
                                ${escapeHtml(a.recommendation||'')} | 비용: ${(a.cost_krw||0).toFixed(0)}원
                            </div>
                        </div>`;
                    }
                }
            }

            body.innerHTML = html;
            overlay.classList.add('active');
        }
    </script>
</body>
</html>
