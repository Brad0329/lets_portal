<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>설정 - LETS 프로젝트 관리</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/navbar.css">
    <link rel="stylesheet" href="/css/settings.css">
    <style>header { display: none; }</style>
</head>
<body>
    <nav id="main-navbar"></nav>

    <main>
        <!-- 표시 설정 -->
        <section class="settings-section">
            <h2>📋 표시 설정</h2>
            <div class="settings-grid">
                <div class="setting-item">
                    <label>상태 필터</label>
                    <select id="set-status-filter">
                        <option value="ongoing">진행중만</option>
                        <option value="all">전체 (진행중+마감)</option>
                        <option value="closed">마감만</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label>입찰공고 최근 (일)</label>
                    <input type="number" id="set-date-range" min="7" max="365" value="30" />
                </div>
                <div class="setting-item">
                    <label>정렬 기준</label>
                    <select id="set-sort-order">
                        <option value="deadline">마감임박순</option>
                        <option value="latest">입찰공고일 최신순</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label>페이지당 건수</label>
                    <select id="set-items-per-page">
                        <option value="10">10건</option>
                        <option value="20">20건</option>
                        <option value="50">50건</option>
                        <option value="100">100건</option>
                    </select>
                </div>
            </div>
            <button class="btn" onclick="saveSettings()">💾 설정 저장</button>
            <span id="settings-msg" class="msg"></span>
        </section>

        <!-- 키워드 관리 → 출처 관리 페이지로 이동 -->
        <section class="settings-section">
            <h2>🏷️ 키워드 관리</h2>
            <p class="section-desc">키워드 관리가 <a href="/source-list.html" style="color:#2980b9;font-weight:600">공고수집 출처</a> 페이지로 이동되었습니다.</p>
            <a href="/source-list.html" class="btn" style="display:inline-block;text-decoration:none">📡 공고수집 출처로 이동</a>
        </section>

        <!-- 기관 목록 -->
        <section class="settings-section">
            <h2>🏢 기관 목록</h2>
            <p class="section-desc">엑셀에서 가져온 입찰공고 사이트 목록 (총 58개)</p>
            <div id="org-list"></div>
        </section>

        <!-- 수집 실행 → 출처 관리 페이지로 이동 -->
        <section class="settings-section">
            <h2>🔄 데이터 수집</h2>
            <p class="section-desc">출처별 수집은 <a href="/source-list.html" style="color:#2980b9;font-weight:600">공고수집 출처</a> 페이지에서 실행할 수 있습니다.</p>
        </section>

        <!-- 계정 관리 (관리자 전용) -->
        <section class="settings-section" id="user-mgmt-section" style="display:none">
            <h2>👤 계정 관리</h2>
            <div class="keyword-controls" style="margin-bottom:16px">
                <input type="text" id="new-user-id" placeholder="아이디" class="keyword-input" style="width:120px" />
                <input type="text" id="new-user-name" placeholder="이름" class="keyword-input" style="width:100px" />
                <select id="new-user-role" class="keyword-group-select">
                    <option value="staff">실무자</option>
                    <option value="admin">관리자</option>
                </select>
                <button class="btn btn-sm" onclick="createUser()">+ 계정 생성</button>
                <span id="user-msg" class="msg"></span>
            </div>
            <div id="user-perm-checks" style="margin-bottom:12px; font-size:0.85rem; color:#555;">
                추가 권한:
                <label><input type="checkbox" id="new-perm-display"> 표시 설정</label>
                <label><input type="checkbox" id="new-perm-keyword"> 키워드 관리</label>
                <label><input type="checkbox" id="new-perm-org"> 기관 목록</label>
                <input type="hidden" id="new-perm-bid-tag" value="0">
            </div>
            <div id="user-list"></div>
        </section>

        <!-- 내 정보 -->
        <section class="settings-section">
            <h2>🔑 비밀번호 변경</h2>
            <div style="max-width:300px">
                <label style="display:block;font-size:0.85rem;color:#555;margin-bottom:4px">현재 비밀번호</label>
                <input type="password" id="my-cur-pw" style="width:100%;padding:8px 10px;border:1px solid #d0d5dd;border-radius:6px;margin-bottom:10px" />
                <label style="display:block;font-size:0.85rem;color:#555;margin-bottom:4px">새 비밀번호</label>
                <input type="password" id="my-new-pw" style="width:100%;padding:8px 10px;border:1px solid #d0d5dd;border-radius:6px;margin-bottom:10px" />
                <label style="display:block;font-size:0.85rem;color:#555;margin-bottom:4px">새 비밀번호 확인</label>
                <input type="password" id="my-confirm-pw" style="width:100%;padding:8px 10px;border:1px solid #d0d5dd;border-radius:6px;margin-bottom:12px" />
                <button class="btn" onclick="changeMyPw()">비밀번호 변경</button>
                <span id="pw-msg" class="msg"></span>
            </div>
        </section>
    </main>

    <script src="/js/auth.js"></script>
    <script src="/js/settings.js"></script>
</body>
</html>
