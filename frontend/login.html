<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - LETS 프로젝트 관리</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #f5f7fa; }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 380px;
        }
        .login-box h1 { text-align: center; font-size: 1.5rem; color: #1a5276; margin-bottom: 8px; }
        .login-box .subtitle { text-align: center; font-size: 0.85rem; color: #777; margin-bottom: 28px; }
        .login-box label { display: block; font-size: 0.85rem; color: #555; font-weight: 500; margin-bottom: 4px; }
        .login-box input {
            width: 100%; padding: 10px 12px; border: 1px solid #d0d5dd;
            border-radius: 6px; font-size: 0.95rem; margin-bottom: 16px;
        }
        .login-box input:focus { outline: none; border-color: #2980b9; box-shadow: 0 0 0 2px rgba(41,128,185,0.15); }
        .login-box button {
            width: 100%; padding: 12px; background: #2980b9; color: white;
            border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; font-weight: 500;
        }
        .login-box button:hover { background: #1a6fa0; }
        .login-error { color: #e74c3c; font-size: 0.85rem; text-align: center; margin-bottom: 12px; display: none; }

        /* 비밀번호 변경 폼 */
        .change-pw-form { display: none; }
        .change-pw-form .info { background: #fff3cd; color: #856404; padding: 10px 14px; border-radius: 6px; font-size: 0.85rem; margin-bottom: 16px; text-align: center; }
    </style>
</head>
<body>
    <div class="login-box">
        <!-- 로그인 폼 -->
        <div id="login-form">
            <h1>LETS</h1>
            <p class="subtitle">프로젝트 관리 시스템</p>
            <div id="login-error" class="login-error"></div>
            <label for="username">아이디</label>
            <input type="text" id="username" placeholder="아이디 입력" autofocus />
            <label for="password">비밀번호</label>
            <input type="password" id="password" placeholder="비밀번호 입력" />
            <button onclick="doLogin()">로그인</button>
        </div>

        <!-- 비밀번호 변경 폼 -->
        <div id="change-pw-form" class="change-pw-form">
            <h1>비밀번호 변경</h1>
            <div class="info">초기 비밀번호 사용 중입니다. 새 비밀번호를 설정해주세요.</div>
            <div id="change-pw-error" class="login-error"></div>
            <label for="current-pw">현재 비밀번호</label>
            <input type="password" id="current-pw" />
            <label for="new-pw">새 비밀번호</label>
            <input type="password" id="new-pw" placeholder="4자 이상" />
            <label for="confirm-pw">새 비밀번호 확인</label>
            <input type="password" id="confirm-pw" />
            <button onclick="doChangePw()">비밀번호 변경</button>
        </div>
    </div>

    <script>
        // 이미 로그인 상태면 대시보드로
        fetch('/api/auth/me').then(r => r.json()).then(data => {
            if (data.user && !data.user.must_change_pw) {
                location.href = '/dashboard.html';
            }
        }).catch(() => {});

        // 엔터키 로그인
        document.getElementById('password').addEventListener('keydown', e => {
            if (e.key === 'Enter') doLogin();
        });
        document.getElementById('username').addEventListener('keydown', e => {
            if (e.key === 'Enter') document.getElementById('password').focus();
        });

        async function doLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errDiv = document.getElementById('login-error');
            errDiv.style.display = 'none';

            if (!username || !password) {
                errDiv.textContent = '아이디와 비밀번호를 입력하세요.';
                errDiv.style.display = 'block';
                return;
            }

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                });
                const data = await res.json();

                if (!res.ok || data.error) {
                    errDiv.textContent = data.error || '로그인 실패';
                    errDiv.style.display = 'block';
                    return;
                }

                if (data.user.must_change_pw) {
                    // 비밀번호 변경 화면으로
                    document.getElementById('login-form').style.display = 'none';
                    document.getElementById('change-pw-form').style.display = 'block';
                    document.getElementById('current-pw').focus();
                } else {
                    location.href = '/dashboard.html';
                }
            } catch (e) {
                errDiv.textContent = '서버 연결 실패';
                errDiv.style.display = 'block';
            }
        }

        // 비밀번호 변경 엔터키
        document.getElementById('confirm-pw')?.addEventListener('keydown', e => {
            if (e.key === 'Enter') doChangePw();
        });

        async function doChangePw() {
            const current = document.getElementById('current-pw').value;
            const newPw = document.getElementById('new-pw').value;
            const confirm = document.getElementById('confirm-pw').value;
            const errDiv = document.getElementById('change-pw-error');
            errDiv.style.display = 'none';

            if (!current || !newPw) {
                errDiv.textContent = '모든 필드를 입력하세요.';
                errDiv.style.display = 'block';
                return;
            }
            if (newPw !== confirm) {
                errDiv.textContent = '새 비밀번호가 일치하지 않습니다.';
                errDiv.style.display = 'block';
                return;
            }
            if (newPw.length < 4) {
                errDiv.textContent = '새 비밀번호는 4자 이상이어야 합니다.';
                errDiv.style.display = 'block';
                return;
            }

            try {
                const res = await fetch('/api/auth/change-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ current_password: current, new_password: newPw }),
                });
                const data = await res.json();
                if (!res.ok || data.error) {
                    errDiv.textContent = data.error || '변경 실패';
                    errDiv.style.display = 'block';
                    return;
                }
                location.href = '/dashboard.html';
            } catch (e) {
                errDiv.textContent = '서버 연결 실패';
                errDiv.style.display = 'block';
            }
        }
    </script>
</body>
</html>
